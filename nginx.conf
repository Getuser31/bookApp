server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php;

    # 1. API and Backend routes go to Laravel
    location ~ ^/(api|sanctum|storage) {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 2. Redirect all other requests to the React dev server running locally
    location / {
        return 302 http://localhost:3000$request_uri;
    }

    # 3. PHP processing for the Laravel routes
    location ~ \.php$ {
        fastcgi_pass php-app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
