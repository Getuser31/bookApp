server {
    listen 80;
    server_name localhost; # Replace with your domain name or server IP address

    # 1. Backend API & Storage (Laravel)
    location ~ ^/(api|sanctum|storage) {
        root /var/www/html/bookapp/public;
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/run/php/php8.4-fpm.sock; # Adjust to your server's PHP-FPM socket path (e.g. php8.2-fpm.sock if using PHP 8.2)
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }

    # 2. Frontend SPA (React)
    location / {
        root /var/www/html/bookapp-frontend/build; # Path to your React app build directory
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
