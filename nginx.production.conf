# 1. HTTPS Server (SSL Enabled)
server {
    listen 443 ssl;
    server_name my-book-library.net www.my-book-library.net;

    # SSL Certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/my-book-library.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my-book-library.net/privkey.pem;
    
    # Best practice SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 1. Backend API & Storage (Laravel)
    location ~ ^/(api|sanctum|storage) {
        root /var/www/html/bookapp/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 2. PHP processing (server-level so internal rewrites to /index.php match correctly)
    location ~ \.php$ {
        root /var/www/html/bookapp/public;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # 3. Frontend SPA (React)
    location / {
        root /var/www/html/bookapp-frontend/build;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# 2. HTTP Server (Redirects all HTTP requests to HTTPS)
server {
    listen 80;
    server_name my-book-library.net www.my-book-library.net;

    return 301 https://$host$request_uri;
}
