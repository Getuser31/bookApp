name: Deploy
on:
  push:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run tests
        run: php artisan test --no-coverage

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - name: Sync Files and Run Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd /var/www/html/bookapp

            git config --global --add safe.directory /var/www/html/bookapp

            GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_bookapp" git pull origin main

            composer install --no-dev --optimize-autoloader

            php artisan migrate --force

            npm install --legacy-peer-deps
            npm run build

            php artisan optimize
